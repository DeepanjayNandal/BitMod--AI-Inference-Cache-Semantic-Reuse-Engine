{{- if not .Values.llm.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bitmod.llmSecretName" . }}
  labels:
    {{- include "bitmod.labels" . | nindent 4 }}
type: Opaque
data: {}
  # Populate via: kubectl create secret generic <name> --from-literal=ANTHROPIC_API_KEY=sk-...
  # Or set llm.existingSecret to point to a pre-created secret.
{{- end }}
---
{{- if and .Values.database.postgresql.enabled (not .Values.database.postgresql.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bitmod.dbSecretName" . }}
  labels:
    {{- include "bitmod.labels" . | nindent 4 }}
type: Opaque
data: {}
  # Populate via: kubectl create secret generic <name> --from-literal=password=<db-password>
{{- end }}
---
{{- if .Values.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bitmod.authSecretName" . }}
  labels:
    {{- include "bitmod.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.auth.autoGenerateKey }}
    "helm.sh/hook": pre-install
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/resource-policy": keep
    {{- end }}
type: Opaque
{{- if .Values.auth.autoGenerateKey }}
data:
  admin-api-key: {{ randAlphaNum 48 | b64enc | quote }}
{{- else }}
data: {}
{{- end }}
{{- end }}
