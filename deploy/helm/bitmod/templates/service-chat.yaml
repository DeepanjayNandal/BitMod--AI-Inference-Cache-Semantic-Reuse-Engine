apiVersion: v1
kind: Service
metadata:
  name: {{ include "bitmod.fullname" . }}-chat
  labels:
    {{- include "bitmod.labels" . | nindent 4 }}
    app.kubernetes.io/component: chat
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.chat.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "bitmod.chat.selectorLabels" . | nindent 4 }}
