{{- if .Values.networkPolicy.enabled }}
---
# Default deny all ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "bitmod.fullname" . }}-default-deny
  labels:
    {{- include "bitmod.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bitmod
  policyTypes:
    - Ingress
  ingress: []
---
# Gateway accepts external traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "bitmod.fullname" . }}-gateway-ingress
  labels:
    {{- include "bitmod.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "bitmod.gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: {{ .Values.gateway.service.port | default 8000 }}
---
# Chat only accepts traffic from gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "bitmod.fullname" . }}-chat-ingress
  labels:
    {{- include "bitmod.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "bitmod.chat.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "bitmod.gateway.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.chat.service.port | default 8001 }}
{{- end }}
