apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bitmod.fullname" . }}-config
  labels:
    {{- include "bitmod.labels" . | nindent 4 }}
data:
  bitmod.yaml: |
    # Auto-generated by Helm — do not edit manually
    llm_primary: {{ .Values.llm.primary }}
    llm_primary_model: {{ .Values.llm.primaryModel }}
    llm_fallback: {{ .Values.llm.fallback }}
    llm_fallback_model: {{ .Values.llm.fallbackModel }}
    embedding_provider: {{ .Values.embedding.provider }}
    embedding_model: {{ .Values.embedding.model }}
    db_backend: {{ .Values.database.backend }}
    {{- if eq .Values.database.backend "sqlite" }}
    db_sqlite_path: /app/data/bitmod.db
    {{- end }}
    {{- if .Values.database.postgresql.enabled }}
    db_host: {{ .Values.database.postgresql.host }}
    db_port: {{ .Values.database.postgresql.port | quote }}
    db_name: {{ .Values.database.postgresql.database }}
    db_user: {{ .Values.database.postgresql.username }}
    {{- end }}
