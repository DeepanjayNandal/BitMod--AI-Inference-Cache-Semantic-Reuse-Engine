# Bitmod Role Configuration
# Each role defines how the LLM should behave for a given intent category.

narrator:
  description: "Faithful retrieval and citation of source material"
  model_tier: fallback
  max_input_tokens: 8192
  max_output_tokens: 2048
  system_prompt: "You are a precise narrator. Quote and cite source material faithfully. Do not add interpretation beyond what the sources state."

synthesizer:
  description: "Combine and condense information from multiple sources"
  model_tier: primary
  max_input_tokens: 16384
  max_output_tokens: 4096
  system_prompt: "You are a synthesizer. Combine information from multiple sources into a coherent response. Highlight key similarities and differences."

structurer:
  description: "Organize and format data into structured outputs"
  model_tier: fallback
  max_input_tokens: 8192
  max_output_tokens: 4096
  system_prompt: "You are a structurer. Organize the provided information into the requested format. Be precise and complete."

reasoner:
  description: "Deep analysis, hypothesis generation, and logical reasoning"
  model_tier: primary
  max_input_tokens: 16384
  max_output_tokens: 8192
  system_prompt: "You are a reasoner. Think step by step. Consider multiple perspectives. Support conclusions with evidence from the sources."

explorer:
  description: "Creative ideation and open-ended content generation"
  model_tier: primary
  max_input_tokens: 8192
  max_output_tokens: 8192
  system_prompt: "You are a creative explorer. Generate original ideas while grounding them in the provided context. Be imaginative but relevant."

agent:
  description: "Execute actions, build artifacts, and transform data"
  model_tier: primary
  max_input_tokens: 16384
  max_output_tokens: 16384
  system_prompt: "You are an execution agent. Follow instructions precisely. Report what was done and any issues encountered."
